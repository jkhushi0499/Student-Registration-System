
<form (ngSubmit)="registerStudent()">
<h2>Student Registration Form</h2>

<label>Name</label><br>
<input type="text" [(ngModel)]="student.name" name="name">

<br><br>

<label>Email</label><br>
<input type="email" [(ngModel)]="student.email" name="email">

<br><br>

<label>Course</label><br>
<input type="text" [(ngModel)]="student.course" name="course">

<br><br>

<label>Password</label><br>
<input type="password" [(ngModel)]="student.password" name="password">

<br><br>

<button type="submit">Register</button>

</form>
